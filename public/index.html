<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Video Edge Detection Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2308111f'/%3E%3Cpath d='M12 45h10l7-24 8 30 6-18h9' fill='none' stroke='%2376b7ff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-meta">
          <span class="hero-id">23127266 - Nguyễn Anh Thư</span>
        </div>
        <h1>Homework 5</h1>
      </header>

      <section class="upload-strip">
        <label class="file-picker" for="videoFile">
          <span>Select local video</span>
          <input
            id="videoFile"
            type="file"
            accept="video/*"
            aria-label="Select a local video file"
          />
        </label>
        <div class="upload-actions">
          <button id="loadDefaultButton" class="btn btn-primary" type="button">
            Load sample
          </button>
          <button id="playPauseButton" class="btn btn-play" type="button" disabled>
            Play
          </button>
        </div>
      </section>

      <section class="media-grid">
        <div id="videoSurface" class="media-frame">
          <video
            id="sourceVideo"
            controls
            playsinline
            preload="metadata"
            crossorigin="anonymous"
          ></video>
        </div>

        <div id="canvasSurface" class="media-frame">
          <canvas
            id="edgeCanvas"
            aria-label="Realtime edge detection output"
          ></canvas>
        </div>
      </section>

      <section class="controls">
        <div class="tuning-group">
          <label class="control-field" for="thresholdMode">
            <span>Threshold mode</span>
            <select id="thresholdMode" aria-label="Threshold mode">
              <option value="manual" selected>Manual</option>
              <option value="adaptive">Adaptive</option>
            </select>
          </label>

          <label class="control-field control-field--wide" for="thresholdSlider">
            <span id="thresholdLabel">High threshold</span>
            <input
              id="thresholdSlider"
              type="range"
              min="20"
              max="180"
              step="1"
              value="72"
              aria-label="Canny threshold control"
            />
          </label>
        </div>
      </section>

      <section class="status-group">
        <p id="statusMessage" class="status">
          Choose a video or load the bundled default sample.
        </p>
        <p class="hint">
          Default sample is bundled locally from the HTML5 Doctor demo source.
        </p>
        <p id="thresholdSummary" class="config">Manual: high = 72, low = 32.</p>
        <p class="config">Processing scale: <code>0.35</code></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
